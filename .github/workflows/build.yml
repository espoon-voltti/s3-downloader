name: Build and Release
on:
  push:
    branches:
      - '**'
    tags:
      - v*

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run tests
        run: ./scripts/test.sh

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
      - uses: actions/cache@v5
        id: go-modules
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-${{ hashFiles('go.sum') }}

      - run: ./scripts/lint
      - run: ./scripts/build

      - if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: s3downloader-linux-amd64
          path: ./bin/s3downloader-linux-amd64

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: s3downloader-linux-amd64
          path: ./bin/
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
      - name: Relase
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/ci-release

  notify:
    if: ${{ always() && contains(needs.*.result, 'failure') && github.ref == 'refs/heads/master' }}
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Report failure
        uses: espoon-voltti/voltti-actions/notify@master
        with:
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          channel: "#infra-alerts"
          message: "s3-downloader CI workflow failed"
